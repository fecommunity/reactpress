version: '3.8'

services:
  db:
    image: mysql:5.7
    container_name: reactpress_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-reactpress}
      MYSQL_USER: ${DB_USER:-reactpress}
      MYSQL_PASSWORD: ${DB_PASSWD:-reactpress}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - reactpress-network

  # API 由宿主机 monorepo server/ 提供（pnpm start 或 pm2）
  # nginx 通过 host.docker.internal:3002 转发 /api

  theme:
    build:
      context: .
      dockerfile: themes/twentytwentyfive/Dockerfile
    container_name: reactpress_theme
    restart: always
    environment:
      - NODE_ENV=production
      - CLIENT_SITE_URL=${CLIENT_SITE_URL:-http://localhost:3001}
      - SERVER_API_URL=${SERVER_API_URL:-http://nginx/api}
    ports:
      - "3001:3001"
    networks:
      - reactpress-network

  nginx:
    image: nginx:alpine
    container_name: reactpress_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      - theme
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - reactpress-network

volumes:
  db_data:

networks:
  reactpress-network:
    driver: bridge
